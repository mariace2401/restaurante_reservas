<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReserVibe — Solicitudes Pendientes</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<nav>
  <span class="nav-logo">ReserVibe</span>
  <div class="nav-links">
    <a href="/restaurantes-page">Restaurantes</a>
    <a href="/mis-reservas-page">Mis reservas</a>
    <a href="/perfil-page">Mi perfil</a>
    <a id="nav-mi-restaurante" href="/mi-restaurante-page" style="display:none">Mi restaurante</a>
    <a href="/admin-solicitudes-page">Solicitudes</a>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>
<div class="content" style="max-width:860px">
  <div class="header-row">
    <div>
      <h2>Solicitudes de administradores</h2>
      <p>Revisa y aprueba o rechaza las solicitudes pendientes</p>
    </div>
  </div>
  <div style="display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap;">
    <button class="btn-nueva" onclick="filtrar('pendiente')" style="flex:0">Pendientes</button>
    <button class="btn-nueva" onclick="filtrar('aprobada')" style="flex:0">Aprobadas</button>
    <button class="btn-nueva" onclick="filtrar('rechazada')" style="flex:0">Rechazadas</button>
    <button class="btn-nueva" onclick="filtrar(null)" style="flex:0">Todas</button>
  </div>
  <div class="lista" id="lista">
    <div class="loading">Cargando solicitudes...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/static/js/AdminSolicitudes.js"></script>
</body>
</html>
