<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReserVibe — Reservar</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<nav>
  <span class="nav-logo">ReserVibe</span>
  <div class="nav-links">
    <a href="/restaurantes-page">Restaurantes</a>
    <a href="/mis-reservas-page">Mis reservas</a>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>
<div class="content" style="max-width:680px">
  <button class="back-btn" onclick="window.location.href='/restaurantes-page'">← Volver</button>
  <div class="rest-header">
    <h2 id="rest-nombre">Cargando...</h2>
    <p id="rest-direccion"></p>
  </div>
  <div class="section-title">Horarios de atención</div>
  <div class="horarios" id="horarios"></div>
  <div class="section-title">Selecciona una mesa</div>
  <div class="mesas-grid" id="mesas"></div>
  <div class="form-card">
    <div class="section-title" style="margin-bottom:1.25rem">Datos de la reserva</div>
    <p class="mesa-seleccionada" id="mesa-seleccionada">Ninguna mesa seleccionada</p>
    <div class="row">
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="fecha"/>
      </div>
      <div class="field">
        <label>Hora</label>
        <input type="time" id="hora"/>
      </div>
    </div>
    <div class="field">
      <label>Número de personas</label>
      <input type="number" id="personas" min="1" placeholder="¿Cuántos van?"/>
    </div>
    <button class="btn" onclick="doReservar()">Confirmar reserva</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script src="/static/js/Reservar.js"></script>
</body>
</html>
