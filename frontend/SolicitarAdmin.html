<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReserVibe — Solicitar ser Admin</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<nav>
  <span class="nav-logo">ReserVibe</span>
  <div class="nav-links">
    <a href="/restaurantes-page">Restaurantes</a>
    <a href="/mis-reservas-page">Mis reservas</a>
    <a href="/perfil-page">Mi perfil</a>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>
<div class="content" style="max-width:600px">
  <button class="back-btn" onclick="window.location.href='/restaurantes-page'">← Volver</button>
  <div class="rest-header">
    <h2>Solicitar ser administrador</h2>
    <p>Completa los datos del restaurante que quieres gestionar</p>
  </div>
  <div class="form-card">
    <div class="field">
      <label>Nombre del restaurante</label>
      <input type="text" id="nombre_restaurante" placeholder="Ej: Mi Restaurante"/>
    </div>
    <div class="field">
      <label>Teléfono</label>
      <input type="text" id="telefono" placeholder="Ej: 3001234567"/>
    </div>
    <div class="field">
      <label>Dirección</label>
      <input type="text" id="direccion" placeholder="Ej: Calle 123 #45-67"/>
    </div>
    <div class="field">
      <label>Descripción</label>
      <input type="text" id="descripcion" placeholder="Breve descripción del restaurante"/>
    </div>
    <div class="row">
      <div class="field">
        <label>Número de mesas</label>
        <input type="number" id="num_mesas" min="1" placeholder="Ej: 5"/>
      </div>
      <div class="field">
        <label>Capacidad por mesa</label>
        <input type="number" id="capacidad_mesas" min="1" placeholder="Ej: 4"/>
      </div>
    </div>
    <div class="section-title" style="margin-top:1.25rem">Horarios de atención</div>
    <div id="horarios-container"></div>
    <button class="btn" onclick="enviarSolicitud()" style="margin-top:.5rem">Enviar solicitud</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script src="/static/js/SolicitarAdmin.js"></script>
</body>
</html>
