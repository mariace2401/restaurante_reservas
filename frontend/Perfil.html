<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReserVibe — Mi Perfil</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<nav>
  <span class="nav-logo">ReserVibe</span>
  <div class="nav-links">
    <a href="/restaurantes-page">Restaurantes</a>
    <a href="/mis-reservas-page">Mis reservas</a>
    <a href="/perfil-page">Mi perfil</a>
    <a id="nav-solicitar-admin" href="/solicitar-admin-page" style="display:none">Ser admin</a>
    <a id="nav-mi-restaurante" href="/mi-restaurante-page" style="display:none">Mi restaurante</a>
    <a id="nav-solicitudes" href="/admin-solicitudes-page" style="display:none">Solicitudes</a>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>
<div class="content" style="max-width:500px">
  <button class="back-btn" onclick="window.location.href='/restaurantes-page'">← Volver</button>
  <div class="rest-header">
    <h2>Mi perfil</h2>
    <p>Consulta y edita tu información personal</p>
  </div>
  <div class="form-card">
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre"/>
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="correo" disabled style="opacity:.7"/>
    </div>
    <div class="field">
      <label>Rol</label>
      <input type="text" id="rol" disabled style="opacity:.7"/>
    </div>
    <div class="field">
      <label>Nueva contraseña (dejar vacío para no cambiar)</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres"/>
    </div>
    <button class="btn" onclick="guardarPerfil()">Guardar cambios</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script src="/static/js/Perfil.js"></script>
</body>
</html>
