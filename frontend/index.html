<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReserVibe — Acceso</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>ReserVibe</h1>
    <p>Tu mesa, tu momento</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login"    onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab"        id="tab-registro" onclick="switchTab('registro')">Registrarse</button>
    </div>
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="login-correo" placeholder="tu@correo.com"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn" onclick="doLogin()">Entrar</button>
      <div class="msg" id="login-msg"></div>
    </div>
    <div class="panel" id="panel-registro">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="reg-nombre" placeholder="Tu nombre"/>
      </div>
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="reg-correo" placeholder="tu@correo.com"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres"/>
      </div>
      <button class="btn" onclick="doRegistro()">Crear cuenta</button>
      <div class="msg" id="reg-msg"></div>
    </div>
  </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
